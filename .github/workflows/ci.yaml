name: Continuous Integration (CI)

on:
  pull_request:
    # `edited` so PR title changes are re-validated by the commit-lint job.
    types: [opened, edited, synchronize, reopened]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:


  # ─────────────────────────────────────────────────────────────
  # Validate PR title follows Conventional Commits
  # ─────────────────────────────────────────────────────────────
  commitlint:
    name: Commit Lint
    # Only PRs carry a title to validate (skips workflow_dispatch runs).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate PR title follows Conventional Commits
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false

  # ─────────────────────────────────────────────────────────────
  # Run standard checks to ensure code quality
  # ─────────────────────────────────────────────────────────────
  check:
    name: Lint, Type Check, Test, Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Smoke test built binary
        run: node dist/main.js --help

  # ─────────────────────────────────────────────────────────────
  # Gate: All checks passed
  # ─────────────────────────────────────────────────────────────
  ci-passed:
    name: 🚧 CI Passed
    if: always()
    needs: [commitlint, check]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all checks passed
        run: |
          if [[ "${{ needs.commitlint.result }}" == "failure" ]] || \
             [[ "${{ needs.check.result }}" == "failure" ]]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "All checks passed (or were skipped)"
